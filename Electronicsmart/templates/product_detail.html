{% extends 'base.html' %}

{% block content %}

<div class="detail">

<img src="{{ product.image.url }}">

<div>

<h1>{{ product.name }}</h1>

<h3>{{ product.brand }}</h3>

<h2>₹{{ product.price }}</h2>

<p>{{ product.description }}</p>

<p>

Available Stock :

{{ product.stock }}

</p>

<button>

Add To Cart

</button>

</div>

</div>

{% endblock %}
